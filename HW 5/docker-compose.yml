services:
  # ---- Zookeeper + Kafka cluster with 2 brokers ----
  zk:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zk_service
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "5"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s

  kafka-broker-a:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_broker_1
    depends_on:
      zk:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zk:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-a:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-broker-b:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_broker_2
    depends_on:
      zk:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zk:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-b:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema_registry_svc:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema_registry
    depends_on:
      kafka-broker-a:
        condition: service_healthy
      kafka-broker-b:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema_registry_svc
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-broker-a:29092,PLAINTEXT://kafka-broker-b:29093
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka_topic_creator:
    image: confluentinc/cp-kafka:7.5.0
    container_name: topic_creator
    depends_on:
      kafka-broker-a:
        condition: service_healthy
      kafka-broker-b:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo "Waiting for brokers ..."
        sleep 10
        kafka-topics --bootstrap-server kafka-broker-a:29092 --create --if-not-exists --topic raw-movie-events --partitions 3 --replication-factor 2 --config min.insync.replicas=1
        echo "Topic raw-movie-events is ready"
        kafka-topics --bootstrap-server kafka-broker-a:29092 --describe --topic raw-movie-events

  # ---- ClickHouse ----
  clickhouse_srv:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse_db
    ports:
      - "8123:8123"
      - "9000:9000"
    depends_on:
      kafka_topic_creator:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_DB: movie_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_vol:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- PostgreSQL ----
  postgres_db:
    image: postgres:16
    container_name: postgres_analytics
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: secret_pass
      POSTGRES_DB: metrics_store
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - postgres_vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics_user -d metrics_store"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Producer (HTTP + synthetic events) ----
  event_producer:
    build: ./producer
    container_name: event_producer
    ports:
      - "8000:8000"
    depends_on:
      kafka_topic_creator:
        condition: service_completed_successfully
      schema_registry_svc:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-broker-a:29092,kafka-broker-b:29093"
      SCHEMA_REGISTRY_URL: "http://schema_registry_svc:8081"
      KAFKA_TOPIC: "raw-movie-events"
      GENERATOR_ENABLED: "true"
      GENERATOR_EPS: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Aggregation Service ----
  agg_service:
    build: ./aggregation
    container_name: aggregation_worker
    ports:
      - "8001:8001"
    depends_on:
      clickhouse_srv:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: "clickhouse_srv"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: "movie_analytics"
      POSTGRES_HOST: "postgres_db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "metrics_store"
      POSTGRES_USER: "metrics_user"
      POSTGRES_PASSWORD: "secret_pass"
      SCHEDULE_CRON: "*/5 * * * *"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- MinIO S3 storage ----
  minio_storage:
    image: minio/minio:latest
    container_name: minio_s3
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_vol:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio_bucket_creator:
    image: minio/mc:latest
    container_name: minio_setup
    depends_on:
      minio_storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio_storage:9000 minioadmin minioadmin &&
      mc mb -p local/movie-analytics || true &&
      echo 'Bucket movie-analytics exists'
      "

  # ---- Export (PG -> S3) ----
  export_svc:
    build: ./export_service
    container_name: export_worker
    ports:
      - "8002:8002"
    depends_on:
      postgres_db:
        condition: service_healthy
      minio_bucket_creator:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: "postgres_db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "metrics_store"
      POSTGRES_USER: "metrics_user"
      POSTGRES_PASSWORD: "secret_pass"
      S3_ENDPOINT: "http://172.19.0.2:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "movie-analytics"
      EXPORT_FORMAT: "parquet"
      SCHEDULE_CRON: "0 1 * * *"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Grafana dashboard ----
  grafana_ui:
    image: grafana/grafana:10.4.0
    container_name: grafana_dash
    ports:
      - "3000:3000"
    depends_on:
      clickhouse_srv:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_vol:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Integration tests (run manually) ----
  test_runner:
    build: ./tests
    profiles: ["tests"]
    depends_on:
      event_producer:
        condition: service_healthy
      clickhouse_srv:
        condition: service_healthy
    environment:
      PRODUCER_URL: "http://event_producer:8000"
      CLICKHOUSE_HOST: "clickhouse_srv"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: "movie_analytics"

volumes:
  clickhouse_vol:
  postgres_vol:
  minio_vol:
  grafana_vol: