services:

  # ── Databases ──────────────────────────────────────────────────────────
  flights-db:
    image: postgres:15
    environment:
      POSTGRES_DB:       flights_db
      POSTGRES_USER:     flights_svc
      POSTGRES_PASSWORD: flights_secret
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flights_svc -d flights_db"]
      interval: 5s
      retries: 6

  bookings-db:
    image: postgres:15
    environment:
      POSTGRES_DB:       bookings_db
      POSTGRES_USER:     bookings_svc
      POSTGRES_PASSWORD: bookings_secret
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookings_svc -d bookings_db"]
      interval: 5s
      retries: 6

  # ── Redis Sentinel cluster ─────────────────────────────────────────────
  redis-primary:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  redis-secondary:
    image: redis:7-alpine
    depends_on:
      redis-primary:
        condition: service_healthy
    command: ["redis-server", "--replicaof", "redis-primary", "6379"]
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  redis-sentinel:
    image: redis:7-alpine
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-secondary:
        condition: service_healthy
    ports:
      - "26380:26379"
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        bind 0.0.0.0
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor primary redis-primary 6379 1
        sentinel down-after-milliseconds primary 5000
        sentinel failover-timeout primary 10000
        sentinel parallel-syncs primary 1
        EOF
        exec redis-sentinel /tmp/sentinel.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      retries: 10

  # ── Migrations ─────────────────────────────────────────────────────────
  migrate-flights:
    image: flyway/flyway:9
    command: >
      -url=jdbc:postgresql://flights-db:5432/flights_db
      -user=flights_svc
      -password=flights_secret
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./flight-service/migrations:/flyway/sql
    depends_on:
      flights-db:
        condition: service_healthy

  migrate-bookings:
    image: flyway/flyway:9
    command: >
      -url=jdbc:postgresql://bookings-db:5432/bookings_db
      -user=bookings_svc
      -password=bookings_secret
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./booking-service/migrations:/flyway/sql
    depends_on:
      bookings-db:
        condition: service_healthy

  # ── Application services ───────────────────────────────────────────────
  flight-service:
    build: ./flight-service
    environment:
      DB_HOST:              flights-db
      DB_PORT:              5432
      DB_NAME:              flights_db
      DB_USER:              flights_svc
      DB_PASS:              flights_secret
      GRPC_PORT:            50051
      SERVICE_API_KEY:      internal-api-key-2026
      REDIS_MODE:           sentinel
      REDIS_MASTER_NAME:    primary
      REDIS_SENTINEL_HOST:  redis-sentinel
      REDIS_SENTINEL_PORT:  26379
      CACHE_TTL_SECONDS:    360
    ports:
      - "50051:50051"
    depends_on:
      migrate-flights:
        condition: service_completed_successfully
      redis-sentinel:
        condition: service_healthy

  booking-service:
    build: ./booking-service
    environment:
      DB_HOST:              bookings-db
      DB_PORT:              5432
      DB_NAME:              bookings_db
      DB_USER:              bookings_svc
      DB_PASS:              bookings_secret
      FLIGHT_SVC_HOST:      flight-service
      FLIGHT_SVC_PORT:      50051
      SERVICE_API_KEY:      internal-api-key-2026
      CB_FAILURE_THRESHOLD: 5
      CB_RESET_TIMEOUT:     15
      CB_WINDOW_SIZE:       10
    ports:
      - "8080:8080"
    depends_on:
      migrate-bookings:
        condition: service_completed_successfully
      flight-service:
        condition: service_started
